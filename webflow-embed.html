<!--
  ============================================================================
  WEBFLOW EMBED SNIPPET - pricing.md landing page
  ============================================================================
  Paste this into a Webflow "Embed" element on the page/section where the
  pricing.md landing should appear (e.g. under Services).

  1. Replace REPLACE_WITH_HOSTED_URL with the live deployed URL (Vercel /
     Lovable / GitHub Pages) of index.html.
  2. The iframe starts at a sensible height and then auto-resizes to fit
     its content via the postMessage listener below - no inner scrollbar.

  Before going live, confirm the deployed URL is iframe-embeddable: its
  response must NOT set `X-Frame-Options` or `Content-Security-Policy:
  frame-ancestors`. (A static deploy on Vercel/GitHub Pages does not by
  default - just don't add them.)
  ============================================================================
-->
<iframe
  id="pricingmd-frame"
  src="REPLACE_WITH_HOSTED_URL"
  title="pricing.md by Valueships"
  loading="lazy"
  style="width:100%; border:0; display:block; height:3200px;"
  scrolling="no"
></iframe>

<script>
  (function () {
    var frame = document.getElementById("pricingmd-frame");
    window.addEventListener("message", function (e) {
      var d = e.data;
      // The landing page posts { height: <px> }.
      if (d && typeof d.height === "number" && d.height > 0) {
        frame.style.height = d.height + "px";
      }
    });
  })();
</script>
